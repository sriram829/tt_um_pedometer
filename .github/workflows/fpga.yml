name: fpga

on:
  push:
    paths:
      - 'fpga/**'
      - 'src/**'
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Verilog Lint
    steps:
      - uses: actions/checkout@v3

      - name: Install Verilator
        run: sudo apt-get install -y verilator

      - name: Lint pedometer core
        run: |
          verilator --lint-only -Wall \
            --bbox-unsup \
            --bbox-sys \
            -Wno-UNUSED \
            -Wno-UNDRIVEN \
            -Wno-DECLFILENAME \
            fpga/src/pedometer_core.v \
            fpga/src/tt_um_pedometer.v \
            fpga/src/top_pedometer.v
          echo "✅ Lint passed!"

      - name: Verify all files present
        run: |
          echo "📁 FPGA Source files:"
          ls -la fpga/src/
          echo "📁 Constraint files:"
          ls -la fpga/constraints/
          echo "✅ All files present!"
